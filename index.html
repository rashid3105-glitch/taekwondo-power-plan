    <!-- FAQ structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Sportstalent?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sportstalent is a sport science strength and conditioning platform built specifically for taekwondo athletes. It generates periodized training programs based on your belt level, competition goals, and weekly TKD schedule."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need gym experience to use Sportstalent?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Programs are adapted to your experience level. Each exercise includes coaching cues, tempo guidelines, and video demonstrations. The system adjusts intensity and volume whether you're a beginner or advanced athlete."
          }
        },
        {
          "@type": "Question",
          "name": "Will strength training make me slower for taekwondo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No — the opposite. Our programs use sport science principles (rate of force development, plyometrics, velocity-based training) specifically designed to increase speed and explosiveness, not bulk. Every exercise is selected for its transfer to kicking speed and agility."
          }
        },
        {
          "@type": "Question",
          "name": "How does the program fit with my existing TKD training?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You tell us how many TKD sessions you train per week, and the system schedules S&C sessions around them — managing intensity so you're never overtrained before sparring or competition days."
          }
        },
        {
          "@type": "Question",
          "name": "Can my coach see my training plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Sportstalent includes a coach dashboard where coaches can view athlete plans, track progress, write diary comments, and send event reminders — all in one place."
          }
        }
      ]
    }
    </script>

  <body>
    <div id="root"></div>

    <script>
      // Defensive blank-screen fallback: if React hasn't mounted anything
      // into #root after 5s (e.g. a native plugin bridge hangs at boot),
      // show a minimal message with a reload button so the user isn't
      // stuck on an empty dark screen.
      setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || root.childElementCount > 0) return;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;color:#e5e7eb;background:#0F172A;text-align:center;">' +
          '<div style="font-weight:700;font-size:18px;margin-bottom:8px;">Sportstalent</div>' +
          '<div style="font-size:14px;opacity:0.8;margin-bottom:20px;max-width:320px;">Appen kunne ikke starte. Tjek din internetforbindelse og pr\u00f8v igen.</div>' +
          '<button onclick="location.reload()" style="background:#F5C842;color:#0F172A;font-weight:600;border:0;border-radius:8px;padding:10px 20px;font-size:14px;">Genindl\u00e6s</button>' +
          '</div>';
      }, 5000);
    </script>
